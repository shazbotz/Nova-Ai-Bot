name: ai-telegram-bot

services:
  - name: bot
    type: web
    git:
      branch: main
    build:
      type: dockerfile
      dockerfile: Dockerfile
    ports:
      - port: 5000
        protocol: http
    env:
      - key: TELEGRAM_BOT_TOKEN
        value: ""
      - key: MONGODB_URI
        value: ""
      - key: ADMIN_TELEGRAM_ID
        value: ""
      - key: MINI_APP_URL
        value: ""
      - key: OPENAI_API_KEY
        value: ""
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: GEMINI_API_KEY
        value: ""
      - key: GROQ_API_KEY
        value: ""
      - key: NODE_ENV
        value: "production"
    health_checks:
      - path: /health
        port: 5000
        initial_delay_seconds: 30
        period_seconds: 30
